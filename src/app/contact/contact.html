<div class="content-section" id="contact">
    <div class="section-header">
        <h2 class="section-title" data-i18n="contact.title">Get in Touch</h2>
        <p class="section-subtitle" data-i18n="contact.subtitle">Let's create something amazing together</p>
    </div>

    <div class="contact-grid">
        <div class="contact-form">
            <div class="form-group">
                <input type="text" placeholder="Your Name" data-i18n-placeholder="contact.form.name">
            </div>
            <div class="form-group">
                <input type="email" placeholder="Your Email" data-i18n-placeholder="contact.form.email">
            </div>
            <div class="form-group">
                <input type="text" placeholder="Subject" data-i18n-placeholder="contact.form.subject">
            </div>
            <div class="form-group">
                <textarea placeholder="Your Message" data-i18n-placeholder="contact.form.message"></textarea>
            </div>
            <button class="submit-btn" data-i18n="contact.form.submit">Send Message</button>
        </div>
        <div class="contact-info">
            <div class="contact-item">
                <div class="contact-icon">&#128205;</div>
                <div class="contact-details">
                    <h4 data-i18n="contact.info.locationLabel">Location</h4>
                    <p>123 Innovation Drive, San Francisco, CA 94107</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">&#128231;</div>
                <div class="contact-details">
                    <h4 data-i18n="contact.info.emailLabel">Email</h4>
                    <p>neiraverse@gmail.com</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">&#128222;</div>
                <div class="contact-details">
                    <h4 data-i18n="contact.info.phoneLabel">Phone</h4>
                    <p>+6282353298529</p>
                </div>
            </div>
        </div>
    </div>
</div>
